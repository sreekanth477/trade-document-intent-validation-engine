version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: trade_doc_postgres
    environment:
      POSTGRES_USER: trade_doc
      POSTGRES_PASSWORD: trade_doc_secret
      POSTGRES_DB: trade_doc_validation
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trade_doc -d trade_doc_validation"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: trade_doc_redis
    command: redis-server --appendonly yes --requirepass redis_secret
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_secret", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trade_doc_backend
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://trade_doc:trade_doc_secret@postgres:5432/trade_doc_validation
      - REDIS_URL=redis://:redis_secret@redis:6379
      - NODE_ENV=production
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trade_doc_frontend
    environment:
      - VITE_API_URL=http://backend:3001/api
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local
